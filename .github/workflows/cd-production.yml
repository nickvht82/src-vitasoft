# CD production: CHỈ chạy thủ công (workflow_dispatch) hoặc khi tạo release tag.
# GitHub Environment "production" nên cấu hình required reviewers — human approval gate.
name: CD Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Git SHA của image đã verify trên staging"
        required: true
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production # required reviewers cấu hình trong repo Settings
    strategy:
      matrix:
        app: [api, homepage, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_PROD }}
          service_account: ${{ vars.GCP_DEPLOYER_SA_PROD }}

      - name: Resolve tag
        id: tag
        run: echo "tag=${{ inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Deploy to GKE prod (image đã build từ staging — không rebuild)
        run: |
          gcloud container clusters get-credentials vitasoft-prod --region ${{ vars.GCP_REGION }}
          cd infra/k8s/overlays/prod
          kustomize edit set image "${{ matrix.app }}=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PROD }}/vitasoft/${{ matrix.app }}:${{ steps.tag.outputs.tag }}"
          kubectl apply -k .
          kubectl rollout status deployment/${{ matrix.app }} -n vitasoft-prod --timeout=300s
          # rollout status fail => kubectl tự giữ ReplicaSet cũ; rollback:
          # kubectl rollout undo deployment/<app> -n vitasoft-prod
